# Continuous integration.
# Builds the debug APK and runs the SAST security scan (Android Lint security
# checks + SpotBugs/FindSecBugs) on every push and pull request to the default
# branch. This workflow needs NO repository secrets.
name: CI

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'screenshots/**'
      - 'LICENSE'
      - '.gitattributes'
      - '.gitignore'
      - '.github/**'
  pull_request:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'screenshots/**'
      - 'LICENSE'
      - '.gitattributes'
      - '.gitignore'
      - '.github/**'

permissions:
  contents: read

jobs:
  build:
    name: assembleDebug + securityScan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle (enables the Gradle build/dependency cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Security scan (Android Lint + SpotBugs/FindSecBugs)
        run: ./gradlew securityScan
