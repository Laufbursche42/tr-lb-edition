# Release build - fully automatic, no manual tagging.
# On every push to `main` this computes the version as 1.0.<n> (n = commits after the
# initial one), builds a SIGNED release APK and publishes a GitHub Release `v1.0.<n>`
# with the APK attached. The first public release is v1.0.0. If a release for that
# version already exists it does nothing, so a new release appears whenever a new
# commit lands on main.
# Manual runs (Actions -> Run workflow) behave the same.
#
# Required repository Secrets (Settings -> Secrets and variables -> Actions):
#   KEYSTORE_BASE64    - the release keystore, base64-encoded (contents of keystore.base64.txt)
#   KEYSTORE_PASSWORD  - the keystore (store) password
#   KEY_ALIAS          - the key alias inside the keystore
#   KEY_PASSWORD       - the password for that key alias
name: Release

on:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - 'screenshots/**'
      - 'LICENSE'
      - '.gitattributes'
      - '.gitignore'
      - '.github/**'
      - 'firmware/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build and publish signed APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for commit-count versioning)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute version from git commit count
        id: ver
        run: |
          COUNT=$(git rev-list --count HEAD)
          PATCH=$((COUNT - 1)); [ "$PATCH" -lt 0 ] && PATCH=0
          echo "version=1.0.$PATCH" >> "$GITHUB_OUTPUT"
          echo "tag=v1.0.$PATCH" >> "$GITHUB_OUTPUT"
          echo "Version 1.0.$PATCH  (1.0.0 at the initial commit, patch = commits after it)"

      - name: Skip if this version was already released
        id: exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.ver.outputs.tag }}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Release ${{ steps.ver.outputs.tag }} already exists -> nothing to do (bump versionName for a new release)."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
            echo "No release ${{ steps.ver.outputs.tag }} yet -> will build and publish."
          fi

      - name: Set up JDK 21 (Temurin)
        if: steps.exists.outputs.exists == 'false'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Android SDK
        if: steps.exists.outputs.exists == 'false'
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        if: steps.exists.outputs.exists == 'false'
        uses: gradle/actions/setup-gradle@v4

      - name: Make gradlew executable
        if: steps.exists.outputs.exists == 'false'
        run: chmod +x ./gradlew

      - name: Decode keystore from KEYSTORE_BASE64 secret
        if: steps.exists.outputs.exists == 'false'
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"

      - name: Build signed release APK
        if: steps.exists.outputs.exists == 'false'
        env:
          KEYSTORE_FILE: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Stage APK under the release name
        if: steps.exists.outputs.exists == 'false'
        run: |
          mkdir -p dist
          cp app/build/outputs/apk/release/app-release.apk "dist/Laufbursche-Edition-${{ steps.ver.outputs.tag }}.apk"

      - name: Build release notes (changelog + disclaimer + phoning-home footer)
        if: steps.exists.outputs.exists == 'false'
        run: |
          chmod +x .github/build-release-notes.sh
          .github/build-release-notes.sh "${{ steps.ver.outputs.version }}" > "$RUNNER_TEMP/release-notes.md"
          echo "----- release notes -----"
          cat "$RUNNER_TEMP/release-notes.md"

      - name: Create GitHub Release and upload the signed APK
        if: steps.exists.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.ver.outputs.tag }}" dist/*.apk \
            --repo "${{ github.repository }}" \
            --target "${{ github.sha }}" \
            --title "Laufbursche Edition ${{ steps.ver.outputs.tag }}" \
            --notes-file "$RUNNER_TEMP/release-notes.md"
